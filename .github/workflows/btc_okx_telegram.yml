name: BTC OKX Telegram Bot

# Trigger cron 1 tiếng/lần + workflow_dispatch cho trigger thủ công
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run_btcbot:
    runs-on: ubuntu-latest
    env:
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      CHAT_ID: ${{ secrets.CHAT_ID }}
      OKX_API_KEY: ${{ secrets.OKX_API_KEY }}
      OKX_SECRET: ${{ secrets.OKX_SECRET }}
      OKX_PASSPHRASE: ${{ secrets.OKX_PASSPHRASE }}

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Setup Python 3.10 (bắt buộc cho talib-binary)
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 3️⃣ Cài dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ccxt pandas talib-binary requests

      # 4️⃣ Chạy btcbot.py
      - name: Run BTC Bot
        run: python btcbot.py
