name: BTC OKX Telegram Bot

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run_btcbot:
    runs-on: ubuntu-latest
    env:
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      CHAT_ID: ${{ secrets.CHAT_ID }}
      OKX_API_KEY: ${{ secrets.OKX_API_KEY }}
      OKX_SECRET: ${{ secrets.OKX_SECRET }}
      OKX_PASSPHRASE: ${{ secrets.OKX_PASSPHRASE }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'  # Dùng 3.11, không cần apt libta-lib

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ccxt pandas TA-Lib requests

      - name: Run BTC Bot
        run: python btcbot.py
