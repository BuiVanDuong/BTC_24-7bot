name: BTC OKX Telegram Bot

on:
  schedule:
    - cron: '0 * * * *'   # chạy 1 tiếng/lần
  workflow_dispatch:       # cho phép trigger thủ công

jobs:
  run_btcbot:
    runs-on: ubuntu-latest
    env:
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      CHAT_ID: ${{ secrets.CHAT_ID }}
      OKX_API_KEY: ${{ secrets.OKX_API_KEY }}
      OKX_SECRET: ${{ secrets.OKX_SECRET }}
      OKX_PASSPHRASE: ${{ secrets.OKX_PASSPHRASE }}

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Setup Python 3.10
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 3️⃣ Cài thư viện cần thiết
      - name: Install dependencies
        run: pip install ccxt pandas talib-binary requests

      # 4️⃣ Chạy btcbot.py
      - name: Run BTC Bot
        run: python btcbot.py
