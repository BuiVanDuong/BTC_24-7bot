name: BTC OKX Telegram Bot

on:
  schedule:
    - cron: '0 * * * *'  # 1 tiếng/lần
  workflow_dispatch:

jobs:
  run_btcbot:
    runs-on: ubuntu-latest
    env:
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      CHAT_ID: ${{ secrets.CHAT_ID }}
      OKX_API_KEY: ${{ secrets.OKX_API_KEY }}
      OKX_SECRET: ${{ secrets.OKX_SECRET }}
      OKX_PASSPHRASE: ${{ secrets.OKX_PASSPHRASE }}

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Setup Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # 3️⃣ Cài hệ thống cần thiết cho TA-Lib
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libta-lib0 libta-lib0-dev

      # 4️⃣ Cài thư viện Python
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ccxt pandas TA-Lib requests

      # 5️⃣ Chạy btcbot.py
      - name: Run BTC Bot
        run: python btcbot.py
