name: BTC OKX Telegram Bot

on:
  schedule:
    - cron: '0 * * * *'  # chạy 1 tiếng/lần
  workflow_dispatch:      # trigger thủ công

jobs:
  run_bot:
    runs-on: ubuntu-latest
    env:
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      CHAT_ID: ${{ secrets.CHAT_ID }}
      OKX_API_KEY: ${{ secrets.OKX_API_KEY }}
      OKX_SECRET: ${{ secrets.OKX_SECRET }}
      OKX_PASSPHRASE: ${{ secrets.OKX_PASSPHRASE }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install ccxt pandas talib-binary requests

      - name: Run bot
        run: python btcbot.py
