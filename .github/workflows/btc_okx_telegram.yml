name: BTC OKX Telegram Bot

on:
  schedule:
    - cron: '0 * * * *'   # Mỗi giờ
  workflow_dispatch:

jobs:
  run_btcbot:
    runs-on: ubuntu-latest
    env:
      BOT_TOKEN:       ${{ secrets.BOT_TOKEN }}
      CHAT_ID:         ${{ secrets.CHAT_ID }}
      OKX_API_KEY:     ${{ secrets.OKX_API_KEY }}
      OKX_SECRET:      ${{ secrets.OKX_SECRET }}
      OKX_PASSPHRASE:  ${{ secrets.OKX_PASSPHRASE }}
      MIN_SCORE:       "60"
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests pandas numpy
      - name: Run BTC Bot
        run: python btcbot.py

  run_xaubot:
    runs-on: ubuntu-latest
    env:
      BOT_TOKEN:       ${{ secrets.BOT_TOKEN }}
      CHAT_ID:         ${{ secrets.CHAT_ID }}
      TWELVE_API_KEY:  ${{ secrets.TWELVE_API_KEY }}
      MIN_SCORE:       "60"
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests pandas numpy
      - name: Run XAU Bot
        run: python xaubot.py
